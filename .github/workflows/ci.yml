name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macOS is the primary target, Linux is supported (spec header) —
        # the suite must stay green on both.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "files need gofmt:" && echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race -count=1 -timeout=300s ./...

      - name: binary size budget (< 20MB, spec §19.3)
        run: |
          go build -o /tmp/daemonseed ./cmd/daemonseed
          size=$(wc -c < /tmp/daemonseed)
          echo "binary size: $((size / 1048576))MB"
          test "$size" -lt 20971520
